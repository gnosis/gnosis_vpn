---
name: Publish Installer
on:
  push:
    branches: [main]
    paths:
      - install/linux.sh
      - .github/workflows/publish-installer.yaml
  workflow_dispatch:
permissions:
  contents: read
  id-token: write
concurrency:
  group: publish-installer
  cancel-in-progress: false
jobs:
  publish:
    name: Upload install/linux.sh to download.gnosisvpn.io
    runs-on: depot-ubuntu-22.04-4
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup GCP
        uses: hoprnet/hopr-workflows/actions/setup-gcp@621619750f6772109d7840a7013135c212925d58 # setup-gcp-v3
        with:
          workload_identity_provider: projects/656686060169/locations/global/workloadIdentityPools/gnosisvpn-gh-pool/providers/github-provider
          service_account: download-gnosisvpn-gh-sa@gnosisvpn-production.iam.gserviceaccount.com
          install_sdk: true
      - name: Upload install/linux.sh
        run: |
          gsutil -h "Content-Type:text/x-shellscript; charset=utf-8" \
                 -h "Cache-Control:public, max-age=300" \
                 cp install/linux.sh gs://download.gnosisvpn.io/install/linux.sh
