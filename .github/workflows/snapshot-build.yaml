name: Snapshot Build
on:
  workflow_dispatch:
    inputs:
      client_version:
        description: 'Client version to build against (default: newest registry version with binaries for all architectures)'
        required: false
        type: string
        default: ''
      app_version:
        description: 'App version to build against (default: newest registry version with binaries for all architectures)'
        required: false
        type: string
        default: ''
      toolkit_version:
        description: 'Toolkit version to build against (default: newest registry version with the darwin binary)'
        required: false
        type: string
        default: ''
  repository_dispatch:
    types: [snapshot_build]
  schedule:
    - cron: '0 1 * * *' # Runs every day at 1 AM UTC. Please note that scheduled workflows can be delayed by up to 3 hours, so the actual execution time may vary.
permissions:
  contents: read
  id-token: write
concurrency:
  group: snapshot-build
  cancel-in-progress: false
jobs:
  build_binary:
    name: Build
    uses: ./.github/workflows/build-binary.yaml
    with:
      version_type: snapshot
      client_version: ${{ inputs.client_version }}
      app_version: ${{ inputs.app_version }}
      toolkit_version: ${{ inputs.toolkit_version }}
    secrets: inherit
  update_snapshot:
    name: Update snapshot
    runs-on: depot-ubuntu-22.04-4
    if: needs.build_binary.outputs.SNAPSHOT_TRIGGERED == 'true'
    needs:
      - build_binary
    env:
      GNOSISVPN_PACKAGE_VERSION: ${{ needs.build_binary.outputs.LATEST_GNOSISVPN_PACKAGE_PR_VERSION }}
      GNOSISVPN_CLIENT_VERSION: ${{ needs.build_binary.outputs.GNOSISVPN_CLIENT_VERSION }}
      GNOSISVPN_APP_VERSION: ${{ needs.build_binary.outputs.GNOSISVPN_APP_VERSION }}
      GNOSISVPN_TOOLKIT_VERSION: ${{ needs.build_binary.outputs.GNOSISVPN_TOOLKIT_VERSION }}
      GNOSISVPN_PREVIOUS_PACKAGE_VERSION: ${{ vars.GNOSISVPN_PACKAGE_PR_VERSION }}
      GNOSISVPN_PREVIOUS_CLIENT_VERSION: ${{ vars.GNOSISVPN_CLIENT_PR_VERSION }}
      GNOSISVPN_PREVIOUS_APP_VERSION: ${{ vars.GNOSISVPN_APP_PR_VERSION }}
      GNOSISVPN_PREVIOUS_TOOLKIT_VERSION: ${{ vars.GNOSISVPN_TOOLKIT_PR_VERSION }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Nix
        uses: hoprnet/hopr-workflows/actions/setup-nix@ade4bbd75f7204255c61d19c23f67d3da221e7d2 # setup-nix-v2.0.2
        with:
          cachix_cache_name: gnosis-vpn
          cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Generate Changelog
        run: nix develop -c ./scripts/generate-changelog.ts
        env:
          GH_TOKEN: ${{ github.token }}
          GNOSISVPN_CHANGELOG_FORMAT: zulip
          GNOSISVPN_PACKAGE_VERSION: ${{ needs.build_binary.outputs.GNOSISVPN_PACKAGE_VERSION }}
      - name: Prepare notification message
        run: |
          # Store content in environment variable for the Zulip action
          {
            echo "NOTIFICATION_CONTENT<<EOF"
            cat build/changelog/changelog
            echo "EOF"
          } >> $GITHUB_ENV
      - name: Notify release
        uses: zulip/github-actions-zulip/send-message@f675f2b4eb2a95fae974215476dcb7ad8dfeff6b # v2.0.2
        with:
          api-key: ${{ secrets.ZULIP_API_KEY }}
          email: ${{ secrets.ZULIP_EMAIL }}
          organization-url: "https://hopr.zulipchat.com"
          type: "stream"
          to: "GnosisVPN"
          topic: "Snapshot Builds"
          content: ${{ env.NOTIFICATION_CONTENT }}
      - name: Generate GitHub App token
        id: bot-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.GH_APP_GNOSISVPN_CLIENT_ID }}
          private-key: ${{ secrets.GH_APP_GNOSISVPN_BOT_PRIVATE_KEY }}
          owner: gnosis
      - name: Update latest merged PR variables
        env:
          GH_TOKEN: ${{ steps.bot-token.outputs.token }}
        run: |
          if [[ "${GNOSISVPN_PACKAGE_VERSION}" != "${GNOSISVPN_PREVIOUS_PACKAGE_VERSION}" ]]; then
            echo "New merged PR found for gnosis_vpn: ${GNOSISVPN_PACKAGE_VERSION}"
            gh variable set GNOSISVPN_PACKAGE_PR_VERSION --repo ${{ github.repository }} --body "${GNOSISVPN_PACKAGE_VERSION}"
          fi
          if [[ "${GNOSISVPN_CLIENT_VERSION}" != "${GNOSISVPN_PREVIOUS_CLIENT_VERSION}" ]]; then
            echo "New merged PR found for gnosis_vpn-client: ${GNOSISVPN_CLIENT_VERSION}"
            gh variable set GNOSISVPN_CLIENT_PR_VERSION --repo ${{ github.repository }} --body "${GNOSISVPN_CLIENT_VERSION}"
          fi
          if [[ "${GNOSISVPN_APP_VERSION}" != "${GNOSISVPN_PREVIOUS_APP_VERSION}" ]]; then
            echo "New merged PR found for gnosis_vpn-app: ${GNOSISVPN_APP_VERSION}"
            gh variable set GNOSISVPN_APP_PR_VERSION --repo ${{ github.repository }} --body "${GNOSISVPN_APP_VERSION}"
          fi
          if [[ "${GNOSISVPN_TOOLKIT_VERSION}" != "${GNOSISVPN_PREVIOUS_TOOLKIT_VERSION}" ]]; then
            echo "New merged PR found for gnosis_vpn-toolkit: ${GNOSISVPN_TOOLKIT_VERSION}"
            gh variable set GNOSISVPN_TOOLKIT_PR_VERSION --repo ${{ github.repository }} --body "${GNOSISVPN_TOOLKIT_VERSION}"
          fi
      - name: Publish snapshot manifest variables
        # This job only runs when artifacts were actually built
        # (SNAPSHOT_TRIGGERED == 'true'), so these variables always reflect the
        # most recent real snapshot — never a no-op skipped run. generate-update-manifest.sh
        # reads them instead of walking workflow runs to find the latest non-skipped build.
        env:
          GH_TOKEN: ${{ steps.bot-token.outputs.token }}
          GNOSISVPN_SNAPSHOT_VERSION: ${{ needs.build_binary.outputs.GNOSISVPN_PACKAGE_VERSION }}
        run: |
          published_at=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "Publishing snapshot version ${GNOSISVPN_SNAPSHOT_VERSION} (published_at ${published_at})"
          gh variable set GNOSISVPN_SNAPSHOT_VERSION --repo ${{ github.repository }} --body "${GNOSISVPN_SNAPSHOT_VERSION}"
          gh variable set GNOSISVPN_SNAPSHOT_DATE --repo ${{ github.repository }} --body "${published_at}"
