# Reusable: publishes pre-built .deb artifacts to the APT repo.
# Callers:
#   - build-binary.yaml: snapshot channel, runs right after Linux build.
#   - release.yaml:      stable channel, runs ONLY after the GitHub release
#                        has been created, so apt clients never see a stable
#                        version that lacks a matching GitHub release.
name: Publish APT
on:
  workflow_call:
    inputs:
      channel:
        description: 'APT suite to publish into (stable or snapshot)'
        required: true
        type: string
      package_version:
        description: 'GNOSISVPN_PACKAGE_VERSION used to name the .deb artifacts'
        required: true
        type: string
jobs:
  publish:
    runs-on: depot-ubuntu-22.04-4
    name: Publish APT (${{ inputs.channel }})
    permissions:
      contents: read
      id-token: write
    env:
      PACKAGE_VERSION: ${{ inputs.package_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install apt tooling
        run: sudo apt-get update && sudo apt-get install -y reprepro gnupg gpg-agent
      - name: Download package artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: gnosisvpn_${{ env.PACKAGE_VERSION }}_*.deb*
          merge-multiple: true
          path: ./build/apt-input
      - name: List downloaded artifacts
        run: ls -la ./build/apt-input
      - name: Setup GPG signing key
        run: |
          printf '%s' "${{ secrets.GNOSISVPN_GPG_PRIVATE_KEY }}" > /tmp/gnosis_vpn_gpg_key.asc
          chmod 600 /tmp/gnosis_vpn_gpg_key.asc
      - name: Setup GCP
        uses: hoprnet/hopr-workflows/actions/setup-gcp@ade4bbd75f7204255c61d19c23f67d3da221e7d2 # setup-gcp-v4
        with:
          workload_identity_provider: projects/656686060169/locations/global/workloadIdentityPools/gnosisvpn-gh-pool/providers/github-provider
          service_account: download-gnosisvpn-gh-sa@gnosisvpn-production.iam.gserviceaccount.com
          install_sdk: true
      - name: Publish APT repository
        shell: bash
        env:
          GNOSISVPN_GPG_PRIVATE_KEY_PATH: /tmp/gnosis_vpn_gpg_key.asc
          GNOSISVPN_GPG_PRIVATE_KEY_PASSWORD: ${{ secrets.GNOSISVPN_GPG_PRIVATE_KEY_PASSWORD }}
        run: |
          bash scripts/publish-apt.sh \
            --channel "${{ inputs.channel }}" \
            --debs ./build/apt-input
      - name: Remove GPG signing key
        if: always()
        run: |
          shred -u /tmp/gnosis_vpn_gpg_key.asc 2>/dev/null || rm -f /tmp/gnosis_vpn_gpg_key.asc
