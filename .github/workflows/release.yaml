name: Close release
on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Version type after release
        required: true
        type: choice
        default: "patch"
        options:
          - patch
          - minor
          - major
      client_version:
        description: 'Client version to release (default: latest gnosis_vpn-client GitHub release)'
        required: false
        type: string
        default: ''
      app_version:
        description: 'App version to release (default: latest gnosis_vpn-app GitHub release)'
        required: false
        type: string
        default: ''
permissions:
  contents: write
  id-token: write
concurrency:
  group: release
  cancel-in-progress: false
jobs:
  build_binary:
    name: Build
    uses: ./.github/workflows/build-binary.yaml
    with:
      version_type: release
      client_version: ${{ inputs.client_version }}
      app_version: ${{ inputs.app_version }}
    secrets: inherit
  release:
    runs-on: depot-ubuntu-22.04-4
    name: Release
    needs: build_binary
    steps:
      - name: Checkout repository
        uses: actions/checkout@eedb4b7701714299852ca5243f1544b817653f33 # hopr-workflows v0.11.1
      - name: Setup Nix
        uses: hoprnet/hopr-workflows/actions/setup-nix@eedb4b7701714299852ca5243f1544b817653f33 # hopr-workflows v0.11.1
        with:
          cachix_cache_name: gnosis-vpn
          cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Display versions
        run: |
          echo "- Package version: v${{ needs.build_binary.outputs.GNOSISVPN_PACKAGE_VERSION }}" | tee -a "$GITHUB_STEP_SUMMARY"
          echo "- Client version: v${{ needs.build_binary.outputs.GNOSISVPN_CLIENT_VERSION }}" | tee -a "$GITHUB_STEP_SUMMARY"
          echo "- App version: v${{ needs.build_binary.outputs.GNOSISVPN_APP_VERSION }}" | tee -a "$GITHUB_STEP_SUMMARY"
      - name: Generate Release Notes
        run: nix develop -c ./scripts/generate-changelog.ts
        env:
          GH_TOKEN: ${{ github.token }}
          GNOSISVPN_PACKAGE_VERSION: ${{ needs.build_binary.outputs.GNOSISVPN_PACKAGE_VERSION }}
          GNOSISVPN_CLIENT_VERSION: ${{ needs.build_binary.outputs.GNOSISVPN_CLIENT_VERSION }}
          GNOSISVPN_APP_VERSION: ${{ needs.build_binary.outputs.GNOSISVPN_APP_VERSION }}
          GNOSISVPN_PREVIOUS_PACKAGE_VERSION: ${{ vars.GNOSISVPN_PACKAGE_RELEASE_VERSION }}
          GNOSISVPN_PREVIOUS_CLIENT_VERSION: ${{ vars.GNOSISVPN_CLIENT_RELEASE_VERSION }}
          GNOSISVPN_PREVIOUS_APP_VERSION: ${{ vars.GNOSISVPN_APP_RELEASE_VERSION }}
          GNOSISVPN_CHANGELOG_FORMAT: github
          # Aggregate PRs merged into the dispatching ref (e.g. a release branch)
          # rather than main, so close-release on a non-main branch produces release
          # notes that match what actually shipped on that branch. Only affects the
          # gnosis_vpn (installer) repo lookup; client/app PRs are aggregated from
          # their own repos with the default branch.
          GNOSISVPN_PACKAGE_BRANCH: ${{ github.ref_name }}
      - name: Generate GitHub App token
        id: bot-token
        uses: actions/create-github-app-token@eedb4b7701714299852ca5243f1544b817653f33 # hopr-workflows v0.11.1
        with:
          client-id: ${{ secrets.GH_APP_GNOSISVPN_CLIENT_ID }}
          private-key: ${{ secrets.GH_APP_GNOSISVPN_BOT_PRIVATE_KEY }}
          owner: gnosis
      - name: Release version
        uses: hoprnet/hopr-workflows/actions/release-version@eedb4b7701714299852ca5243f1544b817653f33 # hopr-workflows v0.11.1
        with:
          source_branch: ${{ github.ref_name }}
          file: package.json
          release_type: ${{ inputs.release_type }}
          cachix_cache_name: gnosis-vpn
          cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          zulip_api_key: ${{ secrets.ZULIP_API_KEY }}
          zulip_email: ${{ secrets.ZULIP_EMAIL }}
          zulip_channel: GnosisVPN
          zulip_topic: Releases
          gcp_service_account: ${{ secrets.GCP_SA_GITHUB_ACTIONS }}
          gcp_artifact_package: gnosis_vpn
          release_notes_file: ./build/changelog/changelog
          github_app_private_key: ${{ secrets.GH_APP_GNOSISVPN_BOT_PRIVATE_KEY }}
          github_app_client_id: ${{ secrets.GH_APP_GNOSISVPN_CLIENT_ID }}
      - name: Bump Version
        id: bump
        shell: bash
        run: |
          gh variable set GNOSISVPN_PACKAGE_RELEASE_VERSION --body "${{ needs.build_binary.outputs.GNOSISVPN_PACKAGE_VERSION }}"
          gh variable set GNOSISVPN_CLIENT_RELEASE_VERSION --body "${{ needs.build_binary.outputs.GNOSISVPN_CLIENT_VERSION }}"
          gh variable set GNOSISVPN_APP_RELEASE_VERSION --body "${{ needs.build_binary.outputs.GNOSISVPN_APP_VERSION }}"
        env:
          GH_TOKEN: ${{ steps.bot-token.outputs.token }}
  publish_apt:
    # Runs after `release` so apt never advertises a version without a matching GitHub release.
    name: Publish APT (stable)
    needs:
      - build_binary
      - release
    uses: ./.github/workflows/publish-apt.yaml
    with:
      channel: stable
      package_version: ${{ needs.build_binary.outputs.GNOSISVPN_PACKAGE_VERSION }}
    secrets: inherit
  prune_bucket:
    name: Prune bucket (stable)
    needs:
      - build_binary
      - publish_apt
    uses: ./.github/workflows/prune-bucket.yaml
    with:
      channel: stable
    secrets: inherit
