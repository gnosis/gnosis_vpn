name: Build
on:
  workflow_call:
    inputs:
      version_type:
        description: 'Possible values are snapshot, commit, pr, release'
        required: true
        type: string
      client_version:
        description: 'Client version to build against; defaults to the newest version in the registry that has binaries for all architectures (or the latest client release when version_type=release)'
        required: false
        type: string
        default: ''
      app_version:
        description: 'App version to build against; defaults to the newest version in the registry that has binaries for all architectures (or the latest app release when version_type=release)'
        required: false
        type: string
        default: ''
      toolkit_version:
        description: 'Toolkit version to build against; defaults to the newest version in the registry that has the darwin binary (or the latest toolkit release when version_type=release)'
        required: false
        type: string
        default: ''
    outputs:
      GNOSISVPN_PACKAGE_VERSION:
        value: ${{ jobs.setup.outputs.GNOSISVPN_PACKAGE_VERSION }}
      LATEST_GNOSISVPN_PACKAGE_PR_VERSION:
        value: ${{ jobs.setup.outputs.LATEST_GNOSISVPN_PACKAGE_PR_VERSION }}
      GNOSISVPN_CLIENT_VERSION:
        value: ${{ jobs.setup.outputs.GNOSISVPN_CLIENT_VERSION }}
      GNOSISVPN_APP_VERSION:
        value: ${{ jobs.setup.outputs.GNOSISVPN_APP_VERSION }}
      GNOSISVPN_TOOLKIT_VERSION:
        value: ${{ jobs.setup.outputs.GNOSISVPN_TOOLKIT_VERSION }}
      SNAPSHOT_TRIGGERED:
        value: ${{ jobs.setup.outputs.SKIP_BUILDING == 'false' }}
concurrency:
  group: build-binary-${{ github.ref }}
  cancel-in-progress: false
jobs:
  setup:
    runs-on: depot-ubuntu-22.04-4
    name: Setup
    permissions:
      contents: read
      id-token: write
    outputs:
      GNOSISVPN_PACKAGE_VERSION: ${{ steps.setup.outputs.GNOSISVPN_PACKAGE_VERSION }}
      LATEST_GNOSISVPN_PACKAGE_PR_VERSION: ${{ steps.setup.outputs.LATEST_GNOSISVPN_PACKAGE_PR_VERSION }}
      GNOSISVPN_CLIENT_VERSION: ${{ steps.setup.outputs.GNOSISVPN_CLIENT_VERSION }}
      GNOSISVPN_APP_VERSION: ${{ steps.setup.outputs.GNOSISVPN_APP_VERSION }}
      GNOSISVPN_TOOLKIT_VERSION: ${{ steps.setup.outputs.GNOSISVPN_TOOLKIT_VERSION }}
      SKIP_BUILDING: ${{ steps.setup.outputs.SKIP_BUILDING }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup GCP
        uses: hoprnet/hopr-workflows/actions/setup-gcp@7263182fc9a2bab22cc5a029929940914eb9748d # setup-gcp-v4
        with:
          workload_identity_provider: projects/656686060169/locations/global/workloadIdentityPools/gnosisvpn-gh-pool/providers/github-provider
          service_account: download-gnosisvpn-gh-sa@gnosisvpn-production.iam.gserviceaccount.com
          install_sdk: true
      - name: Install GitHub CLI
        run: sudo apt update && sudo apt install -y gh
      - name: Resolve build versions
        id: setup
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION_TYPE: ${{ inputs.version_type }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          GNOSISVPN_PACKAGE_PREVIOUS_VERSION: ${{ vars.GNOSISVPN_PACKAGE_PR_VERSION }}
          GNOSISVPN_CLIENT_PREVIOUS_VERSION: ${{ vars.GNOSISVPN_CLIENT_PR_VERSION }}
          GNOSISVPN_APP_PREVIOUS_VERSION: ${{ vars.GNOSISVPN_APP_PR_VERSION }}
          GNOSISVPN_TOOLKIT_PREVIOUS_VERSION: ${{ vars.GNOSISVPN_TOOLKIT_PR_VERSION }}
          INPUT_CLIENT_VERSION: ${{ inputs.client_version }}
          INPUT_APP_VERSION: ${{ inputs.app_version }}
          INPUT_TOOLKIT_VERSION: ${{ inputs.toolkit_version }}
        run: ./scripts/resolve-build-versions.sh
  linux:
    runs-on: ${{ matrix.runner }}
    name: Build Linux ${{ matrix.nix }}
    if: needs.setup.outputs.SKIP_BUILDING != 'true'
    needs: setup
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - nix: x86_64-linux
            nfpm: amd64
            runner: depot-ubuntu-22.04-4
            distribution: deb
          - nix: aarch64-linux
            nfpm: arm64
            runner: depot-ubuntu-22.04-arm-4
            distribution: deb
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup GCP
        uses: hoprnet/hopr-workflows/actions/setup-gcp@7263182fc9a2bab22cc5a029929940914eb9748d # setup-gcp-v4
        with:
          workload_identity_provider: projects/656686060169/locations/global/workloadIdentityPools/gnosisvpn-gh-pool/providers/github-provider
          service_account: download-gnosisvpn-gh-sa@gnosisvpn-production.iam.gserviceaccount.com
          install_sdk: true
      - name: Setup Nix
        uses: hoprnet/hopr-workflows/actions/setup-nix@ade4bbd75f7204255c61d19c23f67d3da221e7d2 # setup-nix-v2.0.2
        with:
          cachix_cache_name: gnosis-vpn
          cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Setup GPG key for signing
        run: |
          echo "${{ secrets.GNOSISVPN_GPG_PRIVATE_KEY }}" > /tmp/gnosis_vpn_gpg_key.asc
          chmod 600 /tmp/gnosis_vpn_gpg_key.asc
      - name: Build Linux package
        shell: bash
        run: |
          nix develop -c just all ${{ matrix.distribution }} ${{ matrix.nix }} true
        env:
          GH_TOKEN: ${{ github.token }}
          GNOSISVPN_PACKAGE_VERSION: ${{ needs.setup.outputs.GNOSISVPN_PACKAGE_VERSION }}
          GNOSISVPN_CLIENT_VERSION: ${{ needs.setup.outputs.GNOSISVPN_CLIENT_VERSION }}
          GNOSISVPN_APP_VERSION: ${{ needs.setup.outputs.GNOSISVPN_APP_VERSION }}
          GNOSISVPN_PREVIOUS_PACKAGE_VERSION: ${{ inputs.version_type == 'release' && vars.GNOSISVPN_PACKAGE_RELEASE_VERSION || vars.GNOSISVPN_PACKAGE_PR_VERSION }}
          GNOSISVPN_PREVIOUS_CLIENT_VERSION: ${{ inputs.version_type == 'release' && vars.GNOSISVPN_CLIENT_RELEASE_VERSION || vars.GNOSISVPN_CLIENT_PR_VERSION }}
          GNOSISVPN_PREVIOUS_APP_VERSION: ${{ inputs.version_type == 'release' && vars.GNOSISVPN_APP_RELEASE_VERSION || vars.GNOSISVPN_APP_PR_VERSION }}
          GNOSISVPN_GPG_PRIVATE_KEY_PATH: /tmp/gnosis_vpn_gpg_key.asc
          GNOSISVPN_GPG_PRIVATE_KEY_PASSWORD: ${{ secrets.GNOSISVPN_GPG_PRIVATE_KEY_PASSWORD }}
          GNOSISVPN_CHANGELOG_FORMAT: debian
      - name: Upload Package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gnosisvpn_${{ needs.setup.outputs.GNOSISVPN_PACKAGE_VERSION }}_${{ matrix.nfpm }}.${{ matrix.distribution }}
          path: ./build/packages/gnosisvpn_${{ needs.setup.outputs.GNOSISVPN_PACKAGE_VERSION }}_${{ matrix.nfpm }}.${{ matrix.distribution }}
      - name: Upload Signature
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gnosisvpn_${{ needs.setup.outputs.GNOSISVPN_PACKAGE_VERSION }}_${{ matrix.nfpm }}.${{ matrix.distribution }}.asc
          path: ./build/packages/gnosisvpn_${{ needs.setup.outputs.GNOSISVPN_PACKAGE_VERSION }}_${{ matrix.nfpm }}.${{ matrix.distribution }}.asc
      - name: Upload Hash
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gnosisvpn_${{ needs.setup.outputs.GNOSISVPN_PACKAGE_VERSION }}_${{ matrix.nfpm }}.${{ matrix.distribution }}.sha256
          path: ./build/packages/gnosisvpn_${{ needs.setup.outputs.GNOSISVPN_PACKAGE_VERSION }}_${{ matrix.nfpm }}.${{ matrix.distribution }}.sha256
      - name: Stage package for Artifact Registry
        if: inputs.version_type == 'release'
        run: |
          # Stage into a clean dir so only the .deb + sidecars are uploaded,
          # under the same versioned filenames as the APT repo
          base="gnosisvpn_${{ needs.setup.outputs.GNOSISVPN_PACKAGE_VERSION }}_${{ matrix.nfpm }}.${{ matrix.distribution }}"
          mkdir -p ./build/registry
          cp "./build/packages/${base}" "./build/registry/${base}"
          cp "./build/packages/${base}.asc" "./build/registry/${base}.asc"
          cp "./build/packages/${base}.sha256" "./build/registry/${base}.sha256"
      - name: Publish into Google Artifact registry
        if: inputs.version_type == 'release'
        uses: hoprnet/hopr-workflows/actions/upload-artifact-registry@621619750f6772109d7840a7013135c212925d58 # upload-artifact-registry-v2
        with:
          source: ./build/registry
          package: gnosis_vpn
          version: ${{ needs.setup.outputs.GNOSISVPN_PACKAGE_VERSION }}
  mac:
    runs-on: depot-macos-15
    name: Build Mac
    needs: setup
    permissions:
      contents: read
      id-token: write
    if: needs.setup.outputs.SKIP_BUILDING != 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup GCP
        uses: hoprnet/hopr-workflows/actions/setup-gcp@7263182fc9a2bab22cc5a029929940914eb9748d # setup-gcp-v4
        with:
          workload_identity_provider: projects/656686060169/locations/global/workloadIdentityPools/gnosisvpn-gh-pool/providers/github-provider
          service_account: download-gnosisvpn-gh-sa@gnosisvpn-production.iam.gserviceaccount.com
          install_sdk: true
      - name: Setup Nix
        uses: hoprnet/hopr-workflows/actions/setup-nix@ade4bbd75f7204255c61d19c23f67d3da221e7d2 # setup-nix-v2.0.2
        with:
          cachix_cache_name: gnosis-vpn
          cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Create mac installer package
        shell: bash
        run: |
          echo "${{ secrets.GNOSISVPN_APPLE_CERTIFICATE_DEVELOPER }}" | base64 --decode > gnosisvpn-developer.p12
          echo "${{ secrets.GNOSISVPN_APPLE_CERTIFICATE_INSTALLER }}" | base64 --decode > gnosisvpn-installer.p12
          export GNOSISVPN_APPLE_CERTIFICATE_DEVELOPER_PATH=$(pwd)/gnosisvpn-developer.p12
          export GNOSISVPN_APPLE_CERTIFICATE_INSTALLER_PATH=$(pwd)/gnosisvpn-installer.p12
          nix develop -c just all dmg aarch64-darwin true
        env:
          GH_TOKEN: ${{ github.token }}
          GNOSISVPN_PACKAGE_VERSION: ${{ needs.setup.outputs.GNOSISVPN_PACKAGE_VERSION }}
          GNOSISVPN_CLIENT_VERSION: ${{ needs.setup.outputs.GNOSISVPN_CLIENT_VERSION }}
          GNOSISVPN_APP_VERSION: ${{ needs.setup.outputs.GNOSISVPN_APP_VERSION }}
          GNOSISVPN_TOOLKIT_VERSION: ${{ needs.setup.outputs.GNOSISVPN_TOOLKIT_VERSION }}
          GNOSISVPN_APPLE_CERTIFICATE_DEVELOPER_PASSWORD: ${{ secrets.GNOSISVPN_APPLE_CERTIFICATE_DEVELOPER_PASSWORD }}
          GNOSISVPN_APPLE_CERTIFICATE_INSTALLER_PASSWORD: ${{ secrets.GNOSISVPN_APPLE_CERTIFICATE_INSTALLER_PASSWORD }}
          GNOSISVPN_APPLE_ID: ${{ secrets.GNOSISVPN_APPLE_ID }}
          GNOSISVPN_APPLE_TEAM_ID: ${{ secrets.GNOSISVPN_APPLE_TEAM_ID }}
          GNOSISVPN_APPLE_PASSWORD: ${{ secrets.GNOSISVPN_APPLE_PASSWORD }}
      - name: Resolve package name and channel
        id: prepare_files
        run: |
          if [[ "${{ inputs.version_type }}" == "release" ]]; then
            channel="stable"
          else
            channel="latest"
          fi
          echo "channel=${channel}" | tee -a "$GITHUB_OUTPUT"
          version="${{ needs.setup.outputs.GNOSISVPN_PACKAGE_VERSION }}"
          fs_version="${version//+/-}"
          echo "pkg=gnosisvpn_${fs_version}_arm64.pkg" | tee -a "$GITHUB_OUTPUT"
      - name: Upload Package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.prepare_files.outputs.pkg }}
          path: ./build/packages/${{ steps.prepare_files.outputs.pkg }}
      - name: Upload Signature
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.prepare_files.outputs.pkg }}.sha256
          path: ./build/packages/${{ steps.prepare_files.outputs.pkg }}.sha256
      - name: Stage files for upload
        run: |
          mkdir -p "./build/macos/${{ steps.prepare_files.outputs.channel }}"
          cp "./build/packages/${{ steps.prepare_files.outputs.pkg }}" \
             "./build/packages/${{ steps.prepare_files.outputs.pkg }}.sha256" \
             "./build/macos/${{ steps.prepare_files.outputs.channel }}/"
      - name: Publish into Google Artifact registry
        if: inputs.version_type == 'release'
        uses: hoprnet/hopr-workflows/actions/upload-artifact-registry@621619750f6772109d7840a7013135c212925d58 # upload-artifact-registry-v2
        with:
          source: ./build/macos/${{ steps.prepare_files.outputs.channel }}
          package: gnosis_vpn
          version: ${{ needs.setup.outputs.GNOSISVPN_PACKAGE_VERSION }}
      - name: Setup GCP
        uses: hoprnet/hopr-workflows/actions/setup-gcp@7263182fc9a2bab22cc5a029929940914eb9748d # setup-gcp-v4
        if: inputs.version_type == 'snapshot' || inputs.version_type == 'release'
        with:
          workload_identity_provider: projects/656686060169/locations/global/workloadIdentityPools/gnosisvpn-gh-pool/providers/github-provider
          service_account: download-gnosisvpn-gh-sa@gnosisvpn-production.iam.gserviceaccount.com
          install_sdk: true
      - name: Check no stable macOS re-release
        # Refuse to overwrite a versioned stable .pkg with different bytes —
        # the immutable cache would split client bytes from .sha256. Retries
        # with matching bytes are idempotent. Mirrors scripts/publish-apt.sh.
        if: inputs.version_type == 'release'
        run: |
          dest="gs://download.gnosisvpn.io/macos/stable/${{ steps.prepare_files.outputs.pkg }}"
          local_pkg="./build/macos/stable/${{ steps.prepare_files.outputs.pkg }}"
          if gsutil -q stat "$dest" 2>/dev/null; then
            tmp=$(mktemp)
            gsutil -q cp "$dest" "$tmp"
            if ! cmp -s "$tmp" "$local_pkg"; then
              echo "ERROR: ${dest} already exists with different content." >&2
              echo "Re-releasing the same version is not supported — bump package.json or delete the old .pkg manually." >&2
              rm -f "$tmp"
              exit 1
            fi
            rm -f "$tmp"
            echo "Stable .pkg already in bucket with matching bytes; upload will be idempotent."
          fi
      - name: Publish into bucket
        # Cache headers are set at upload time (gsutil -h) rather than via a
        # post-upload `setmeta` wildcard to only touch the newly uploaded objects.
        if: inputs.version_type == 'snapshot' || inputs.version_type == 'release'
        run: |
          gsutil -m -h "Cache-Control:public, max-age=31536000, immutable" \
            cp -r "./build/macos/${{ steps.prepare_files.outputs.channel }}/." \
            "gs://download.gnosisvpn.io/macos/${{ steps.prepare_files.outputs.channel }}/"
  ## TODO Publish into IPFS as well
  publish_apt:
    name: Publish APT
    needs:
      - setup
      - linux
    if: |
      needs.setup.outputs.SKIP_BUILDING != 'true' &&
      inputs.version_type == 'snapshot'
    uses: ./.github/workflows/publish-apt.yaml
    with:
      channel: snapshot
      package_version: ${{ needs.setup.outputs.GNOSISVPN_PACKAGE_VERSION }}
    secrets: inherit
  prune_bucket:
    name: Prune bucket
    needs:
      - setup
      - linux
      - mac
      - publish_apt
    if: |
      needs.setup.outputs.SKIP_BUILDING != 'true' &&
      inputs.version_type == 'snapshot'
    uses: ./.github/workflows/prune-bucket.yaml
    with:
      channel: snapshot
    secrets: inherit
