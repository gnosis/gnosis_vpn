name: Build
on:
  workflow_call:
    inputs:
      version_type:
        description: 'Possible values are snapshot, commit, pr, release'
        required: true
        type: string
      client_version:
        description: "gnosis_vpn-client artifact version. 'latest' = newest in Artifact Registry. Only honored when version_type=snapshot."
        required: true
        type: string
        default: "latest"
      app_version:
        description: "gnosis_vpn-app artifact version. 'latest' = newest in Artifact Registry. Only honored when version_type=snapshot."
        required: true
        type: string
        default: "latest"
    outputs:
      GNOSISVPN_PACKAGE_VERSION:
        value: ${{ jobs.setup.outputs.GNOSISVPN_PACKAGE_VERSION }}
      LATEST_GNOSISVPN_PACKAGE_PR_VERSION:
        value: ${{ jobs.setup.outputs.LATEST_GNOSISVPN_PACKAGE_PR_VERSION }}
      GNOSISVPN_CLIENT_VERSION:
        value: ${{ jobs.setup.outputs.GNOSISVPN_CLIENT_VERSION }}
      GNOSISVPN_APP_VERSION:
        value: ${{ jobs.setup.outputs.GNOSISVPN_APP_VERSION }}
      SNAPSHOT_TRIGGERED:
        value: ${{ jobs.setup.outputs.SKIP_BUILDING == 'false' }}
concurrency:
  group: build-binary-${{ github.ref }}
  cancel-in-progress: false
jobs:
  setup:
    runs-on: depot-ubuntu-22.04-4
    name: Setup
    permissions:
      contents: read
      id-token: write # OIDC GCP auth for the snapshot-only AR version resolution.
    outputs:
      GNOSISVPN_PACKAGE_VERSION: ${{ steps.setup.outputs.GNOSISVPN_PACKAGE_VERSION }}
      LATEST_GNOSISVPN_PACKAGE_PR_VERSION: ${{ steps.setup.outputs.LATEST_GNOSISVPN_PACKAGE_PR_VERSION }}
      GNOSISVPN_CLIENT_VERSION: ${{ steps.setup.outputs.GNOSISVPN_CLIENT_VERSION }}
      GNOSISVPN_APP_VERSION: ${{ steps.setup.outputs.GNOSISVPN_APP_VERSION }}
      SKIP_BUILDING: ${{ steps.setup.outputs.SKIP_BUILDING }}
    steps:
      - name: Setup GCP (for Artifact Registry version resolution)
        # Only the snapshot path resolves versions from AR; other modes keep the
        # GitHub-merge-based resolution and don't need GCP in setup.
        if: inputs.version_type == 'snapshot'
        uses: hoprnet/hopr-workflows/actions/setup-gcp@621619750f6772109d7840a7013135c212925d58 # setup-gcp-v3
        with:
          workload_identity_provider: projects/656686060169/locations/global/workloadIdentityPools/gnosisvpn-gh-pool/providers/github-provider
          service_account: download-gnosisvpn-gh-sa@gnosisvpn-production.iam.gserviceaccount.com
          install_sdk: true
      - name: Setup environment variables
        id: setup
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PREVIOUS_GNOSISVPN_PACKAGE_PR_VERSION: ${{ vars.GNOSISVPN_PACKAGE_PR_VERSION }}
          PREVIOUS_GNOSISVPN_CLIENT_PR_VERSION: ${{ vars.GNOSISVPN_CLIENT_PR_VERSION }}
          PREVIOUS_GNOSISVPN_APP_PR_VERSION: ${{ vars.GNOSISVPN_APP_PR_VERSION }}
        run: |
          sudo apt update && sudo apt install -y gh
          get_latest_pr_version() {
            local repo=$1
            local file_path=$2
            pr_number=$(gh api "repos/gnosis/$repo/pulls?state=closed&base=main&sort=updated&direction=desc&per_page=100" --jq '[.[] | select(.merged_at != null)] | sort_by(.merged_at) | last | .number | tostring')
            merge_sha=$(gh api "repos/gnosis/$repo/pulls/$pr_number" --jq '.merge_commit_sha')
            file_content=$(gh api "repos/gnosis/$repo/contents/$file_path?ref=$merge_sha" --jq '.content' | base64 --decode)
            if [[ "$file_path" == "package.json" ]]; then
              version=$(echo "$file_content" | jq -r '.version')
            else
              version=$(echo "$file_content" | grep '^version\s*=' | head -n 1 | cut -d '"' -f 2)
            fi
            echo "$version+pr.$pr_number"
          }

          get_latest_release_version() {
            local repo=$1
            gh api "repos/gnosis/$repo/releases/latest" --jq '.tag_name' | sed 's/^v//'
          }

          # Newest version uploaded to Artifact Registry for a given package,
          # sorted by createTime descending. Returns the bare version string
          # (e.g. "0.86.0+pr.562"). Empty output if no versions exist.
          # `--sort-by='~createTime'`: '~' is gcloud's descending-order marker.
          # `awk -F/` strips the resource-path prefix that gcloud returns under
          # `--format='value(name)'` and leaves just the leaf version.
          ar_latest_version() {
            local package=$1
            gcloud artifacts versions list \
              --project=gnosisvpn-production --location=europe-west3 --repository=rust-binaries \
              --package="$package" --sort-by='~createTime' --limit=1 \
              --format='value(name)' 2>/dev/null \
              | awk -F/ '{print $NF}'
          }

          # 0 if at least one file exists for <package>:<version> in AR. Used
          # to pre-flight manual overrides — no walk-back, because user pinned
          # explicitly and a missing pin is an error, not a substitution.
          ar_version_exists() {
            local package=$1 version=$2
            gcloud artifacts files list \
              --project=gnosisvpn-production --location=europe-west3 --repository=rust-binaries \
              --package="$package" --version="$version" --limit=1 \
              --format='value(name)' 2>/dev/null | grep -q .
          }

          LATEST_GNOSISVPN_PACKAGE_PR_VERSION=$(get_latest_pr_version "gnosis_vpn" "package.json")
          # Client/app GitHub-PR resolution is still done here because the
          # commit/pr cases below use it. The snapshot case bypasses it and
          # asks AR directly (see resolution block).
          LATEST_GNOSISVPN_CLIENT_PR_VERSION=$(get_latest_pr_version "gnosis_vpn-client" "Cargo.toml")
          LATEST_GNOSISVPN_APP_PR_VERSION=$(get_latest_pr_version "gnosis_vpn-app" "src-tauri/Cargo.toml")
          LATEST_GNOSISVPN_PACKAGE_VERSION_NUMBER=$(echo "$LATEST_GNOSISVPN_PACKAGE_PR_VERSION" | cut -d '+' -f 1)
          LATEST_GNOSISVPN_PACKAGE_VERSION_PR_NUMBER=$(echo "$LATEST_GNOSISVPN_PACKAGE_PR_VERSION" | cut -d '+' -f 2 | cut -d '.' -f 2)
          PREVIOUS_GNOSISVPN_PACKAGE_VERSION_PR_NUMBER=$(echo "${PREVIOUS_GNOSISVPN_PACKAGE_PR_VERSION}" | cut -d '+' -f 2 | cut -d '.' -f 2)
          echo "LATEST_GNOSISVPN_PACKAGE_PR_VERSION=$LATEST_GNOSISVPN_PACKAGE_PR_VERSION" | tee -a "$GITHUB_OUTPUT"

          # Tracks whether a snapshot run pinned client/app via inputs (vs the
          # default 'latest' auto-resolve). Used below to bypass SKIP_BUILDING.
          OVERRIDE_ACTIVE=false

          case "${{ inputs.version_type }}" in
            snapshot)
              # 'latest' (default) resolves to the newest version that actually
              # exists in Artifact Registry — Artifact Registry is the source
              # of truth for "this binary is buildable", not GitHub's merge log.
              # That means the next cron run automatically picks up a newer PR
              # the moment its binaries publish, with no walk-back logic.
              # Manual overrides are still validated against the canonical
              # artifact-key regex (scripts/common.sh:37) AND pre-flight-checked
              # in AR so typos fail before the matrix spins up.
              CLIENT_OVERRIDE="${{ inputs.client_version }}"
              APP_OVERRIDE="${{ inputs.app_version }}"
              SEMVER_RE='^[0-9]+\.[0-9]+\.[0-9]+(\+(pr|commit|build)(\.[0-9A-Za-z-]+)*)?$'

              # client
              if [[ -z "$CLIENT_OVERRIDE" || "$CLIENT_OVERRIDE" == "latest" ]]; then
                CLIENT_RESOLVED=$(ar_latest_version "gnosis_vpn-client")
                if [[ -z "$CLIENT_RESOLVED" ]]; then
                  echo "::error::No gnosis_vpn-client versions found in Artifact Registry. Producer CI is broken or the repo is empty."
                  exit 1
                fi
                echo "Resolved gnosis_vpn-client latest from AR: $CLIENT_RESOLVED"
              elif [[ "$CLIENT_OVERRIDE" =~ $SEMVER_RE ]]; then
                if ar_version_exists "gnosis_vpn-client" "$CLIENT_OVERRIDE"; then
                  CLIENT_RESOLVED="$CLIENT_OVERRIDE"
                  OVERRIDE_ACTIVE=true
                else
                  echo "::error::client_version '$CLIENT_OVERRIDE' not found in Artifact Registry. Use 'latest' or a known-good version."
                  exit 1
                fi
              else
                echo "::error::Invalid client_version '$CLIENT_OVERRIDE'. Expected MAJOR.MINOR.PATCH(+pr.N|+commit.SHA|+build.TS) or 'latest'."
                exit 1
              fi

              # app
              if [[ -z "$APP_OVERRIDE" || "$APP_OVERRIDE" == "latest" ]]; then
                APP_RESOLVED=$(ar_latest_version "gnosis_vpn-app")
                if [[ -z "$APP_RESOLVED" ]]; then
                  echo "::error::No gnosis_vpn-app versions found in Artifact Registry."
                  exit 1
                fi
                echo "Resolved gnosis_vpn-app latest from AR: $APP_RESOLVED"
              elif [[ "$APP_OVERRIDE" =~ $SEMVER_RE ]]; then
                if ar_version_exists "gnosis_vpn-app" "$APP_OVERRIDE"; then
                  APP_RESOLVED="$APP_OVERRIDE"
                  OVERRIDE_ACTIVE=true
                else
                  echo "::error::app_version '$APP_OVERRIDE' not found in Artifact Registry. Use 'latest' or a known-good version."
                  exit 1
                fi
              else
                echo "::error::Invalid app_version '$APP_OVERRIDE'. Expected MAJOR.MINOR.PATCH(+pr.N|+commit.SHA|+build.TS) or 'latest'."
                exit 1
              fi

              echo "GNOSISVPN_PACKAGE_VERSION=$(date +%Y.%m.%d+build.%H%M%S)" | tee -a "$GITHUB_OUTPUT"
              echo "GNOSISVPN_CLIENT_VERSION=${CLIENT_RESOLVED}" | tee -a "$GITHUB_OUTPUT"
              echo "GNOSISVPN_APP_VERSION=${APP_RESOLVED}" | tee -a "$GITHUB_OUTPUT"
              ;;
            commit)
              sha="${{ github.event.pull_request.head.sha }}"
              echo "GNOSISVPN_PACKAGE_VERSION=${LATEST_GNOSISVPN_PACKAGE_VERSION_NUMBER}+commit.${sha:0:7}" | tee -a "$GITHUB_OUTPUT"
              echo "GNOSISVPN_CLIENT_VERSION=${LATEST_GNOSISVPN_CLIENT_PR_VERSION}" | tee -a "$GITHUB_OUTPUT"
              echo "GNOSISVPN_APP_VERSION=${LATEST_GNOSISVPN_APP_PR_VERSION}" | tee -a "$GITHUB_OUTPUT"
              ;;
            pr)
              echo "GNOSISVPN_PACKAGE_VERSION=${LATEST_GNOSISVPN_PACKAGE_PR_VERSION}" | tee -a "$GITHUB_OUTPUT"
              echo "GNOSISVPN_CLIENT_VERSION=${LATEST_GNOSISVPN_CLIENT_PR_VERSION}" | tee -a "$GITHUB_OUTPUT"
              echo "GNOSISVPN_APP_VERSION=${LATEST_GNOSISVPN_APP_PR_VERSION}" | tee -a "$GITHUB_OUTPUT"
              ;;
            release)
              GNOSISVPN_CLIENT_VERSION=$(get_latest_release_version "gnosis_vpn-client")
              GNOSISVPN_APP_VERSION=$(get_latest_release_version "gnosis_vpn-app")
              echo "GNOSISVPN_PACKAGE_VERSION=${LATEST_GNOSISVPN_PACKAGE_VERSION_NUMBER}" | tee -a "$GITHUB_OUTPUT"
              echo "GNOSISVPN_CLIENT_VERSION=${GNOSISVPN_CLIENT_VERSION}" | tee -a "$GITHUB_OUTPUT"
              echo "GNOSISVPN_APP_VERSION=${GNOSISVPN_APP_VERSION}" | tee -a "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Invalid version_type: ${{ inputs.version_type }}. Expected snapshot, commit, pr, or release."
              exit 1
              ;;
          esac

          # Skip only when there is literally nothing new to ship: this repo's
          # latest merged PR hasn't moved AND the client/app versions we'd
          # resolve now (from AR) match what we built last time. The
          # CLIENT_RESOLVED / APP_RESOLVED comparison is what makes the
          # workflow naturally retry once a missing upstream binary finally
          # publishes — RESOLVED moves the moment the artifact lands, while
          # PREVIOUS (vars.GNOSISVPN_*_PR_VERSION) holds the last actually-built.
          # A manual override always forces a build (OVERRIDE_ACTIVE=true).
          if [[ "${{ inputs.version_type}}" == "snapshot" ]] &&
             [[ "${OVERRIDE_ACTIVE}" != "true" ]] &&
             [[ "${LATEST_GNOSISVPN_PACKAGE_VERSION_PR_NUMBER}" == "${PREVIOUS_GNOSISVPN_PACKAGE_VERSION_PR_NUMBER}" ]] &&
             [[ "${CLIENT_RESOLVED}" == "${PREVIOUS_GNOSISVPN_CLIENT_PR_VERSION}" ]] &&
             [[ "${APP_RESOLVED}" == "${PREVIOUS_GNOSISVPN_APP_PR_VERSION}" ]]; then
            echo "SKIP_BUILDING=true" | tee -a "$GITHUB_OUTPUT"
            echo "Resolved client/app versions match last successful build — nothing to rebuild."
          else
            echo "SKIP_BUILDING=false" | tee -a "$GITHUB_OUTPUT"
            if [[ "${OVERRIDE_ACTIVE}" == "true" ]]; then
              echo "Manual override in effect (client=${CLIENT_RESOLVED}, app=${APP_RESOLVED}); forcing build."
            else
              echo "Building (client=${CLIENT_RESOLVED}, app=${APP_RESOLVED})."
            fi
          fi
  linux:
    runs-on: ${{ matrix.runner }}
    name: Build Linux ${{ matrix.nix }}
    if: needs.setup.outputs.SKIP_BUILDING != 'true'
    needs: setup
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - nix: x86_64-linux
            nfpm: amd64
            runner: depot-ubuntu-22.04-4
            distribution: deb
          - nix: aarch64-linux
            nfpm: arm64
            runner: depot-ubuntu-22.04-arm-4
            distribution: deb
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup GCP
        uses: hoprnet/hopr-workflows/actions/setup-gcp@621619750f6772109d7840a7013135c212925d58 # setup-gcp-v3
        with:
          google_credentials: ${{ secrets.GCP_SA_GITHUB_ACTIONS }}
          install_sdk: true
      - name: Setup Nix
        uses: hoprnet/hopr-workflows/actions/setup-nix@c8d45034bb33307dfda3b4dfcd1fc4000cadc05a # setup-nix-v1
        with:
          cachix_cache_name: gnosis-vpn
          cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Setup GPG key for signing
        run: |
          echo "${{ secrets.GNOSISVPN_GPG_PRIVATE_KEY }}" > /tmp/gnosis_vpn_gpg_key.asc
          chmod 600 /tmp/gnosis_vpn_gpg_key.asc
      - name: Build Linux package
        shell: bash
        run: |
          nix develop -c just all ${{ matrix.distribution }} ${{ matrix.nix }} true
        env:
          GH_TOKEN: ${{ github.token }}
          GNOSISVPN_PACKAGE_VERSION: ${{ needs.setup.outputs.GNOSISVPN_PACKAGE_VERSION }}
          GNOSISVPN_CLIENT_VERSION: ${{ needs.setup.outputs.GNOSISVPN_CLIENT_VERSION }}
          GNOSISVPN_APP_VERSION: ${{ needs.setup.outputs.GNOSISVPN_APP_VERSION }}
          GNOSISVPN_PREVIOUS_PACKAGE_VERSION: ${{ inputs.version_type == 'release' && vars.GNOSISVPN_PACKAGE_RELEASE_VERSION || vars.GNOSISVPN_PACKAGE_PR_VERSION }}
          GNOSISVPN_PREVIOUS_CLIENT_VERSION: ${{ inputs.version_type == 'release' && vars.GNOSISVPN_CLIENT_RELEASE_VERSION || vars.GNOSISVPN_CLIENT_PR_VERSION }}
          GNOSISVPN_PREVIOUS_APP_VERSION: ${{ inputs.version_type == 'release' && vars.GNOSISVPN_APP_RELEASE_VERSION || vars.GNOSISVPN_APP_PR_VERSION }}
          GNOSISVPN_GPG_PRIVATE_KEY_PATH: /tmp/gnosis_vpn_gpg_key.asc
          GNOSISVPN_GPG_PRIVATE_KEY_PASSWORD: ${{ secrets.GNOSISVPN_GPG_PRIVATE_KEY_PASSWORD }}
          GNOSISVPN_CHANGELOG_FORMAT: debian
      - name: Upload Package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gnosisvpn_${{ needs.setup.outputs.GNOSISVPN_PACKAGE_VERSION }}_${{ matrix.nfpm }}.${{ matrix.distribution }}
          path: ./build/packages/gnosisvpn_${{ needs.setup.outputs.GNOSISVPN_PACKAGE_VERSION }}_${{ matrix.nfpm }}.${{ matrix.distribution }}
      - name: Upload Signature
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gnosisvpn_${{ needs.setup.outputs.GNOSISVPN_PACKAGE_VERSION }}_${{ matrix.nfpm }}.${{ matrix.distribution }}.asc
          path: ./build/packages/gnosisvpn_${{ needs.setup.outputs.GNOSISVPN_PACKAGE_VERSION }}_${{ matrix.nfpm }}.${{ matrix.distribution }}.asc
      - name: Upload Hash
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gnosisvpn_${{ needs.setup.outputs.GNOSISVPN_PACKAGE_VERSION }}_${{ matrix.nfpm }}.${{ matrix.distribution }}.sha256
          path: ./build/packages/gnosisvpn_${{ needs.setup.outputs.GNOSISVPN_PACKAGE_VERSION }}_${{ matrix.nfpm }}.${{ matrix.distribution }}.sha256
  mac:
    runs-on: depot-macos-15
    name: Build Mac
    needs: setup
    permissions:
      contents: read
      id-token: write
    if: needs.setup.outputs.SKIP_BUILDING != 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup GCP
        uses: hoprnet/hopr-workflows/actions/setup-gcp@621619750f6772109d7840a7013135c212925d58 # setup-gcp-v3
        with:
          google_credentials: ${{ secrets.GCP_SA_GITHUB_ACTIONS }}
          install_sdk: true
      - name: Setup Nix
        uses: hoprnet/hopr-workflows/actions/setup-nix@c8d45034bb33307dfda3b4dfcd1fc4000cadc05a # setup-nix-v1
        with:
          cachix_cache_name: gnosis-vpn
          cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Create mac installer package
        shell: bash
        run: |
          echo "${{ secrets.GNOSISVPN_APPLE_CERTIFICATE_DEVELOPER }}" | base64 --decode > gnosisvpn-developer.p12
          echo "${{ secrets.GNOSISVPN_APPLE_CERTIFICATE_INSTALLER }}" | base64 --decode > gnosisvpn-installer.p12
          export GNOSISVPN_APPLE_CERTIFICATE_DEVELOPER_PATH=$(pwd)/gnosisvpn-developer.p12
          export GNOSISVPN_APPLE_CERTIFICATE_INSTALLER_PATH=$(pwd)/gnosisvpn-installer.p12
          nix develop -c just all dmg aarch64-darwin true
        env:
          GH_TOKEN: ${{ github.token }}
          GNOSISVPN_PACKAGE_VERSION: ${{ needs.setup.outputs.GNOSISVPN_PACKAGE_VERSION }}
          GNOSISVPN_CLIENT_VERSION: ${{ needs.setup.outputs.GNOSISVPN_CLIENT_VERSION }}
          GNOSISVPN_APP_VERSION: ${{ needs.setup.outputs.GNOSISVPN_APP_VERSION }}
          GNOSISVPN_APPLE_CERTIFICATE_DEVELOPER_PASSWORD: ${{ secrets.GNOSISVPN_APPLE_CERTIFICATE_DEVELOPER_PASSWORD }}
          GNOSISVPN_APPLE_CERTIFICATE_INSTALLER_PASSWORD: ${{ secrets.GNOSISVPN_APPLE_CERTIFICATE_INSTALLER_PASSWORD }}
          GNOSISVPN_APPLE_ID: ${{ secrets.GNOSISVPN_APPLE_ID }}
          GNOSISVPN_APPLE_TEAM_ID: ${{ secrets.GNOSISVPN_APPLE_TEAM_ID }}
          GNOSISVPN_APPLE_PASSWORD: ${{ secrets.GNOSISVPN_APPLE_PASSWORD }}
      - name: Upload Package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: GnosisVPN-Installer.pkg
          path: ./build/packages/GnosisVPN-Installer-v${{ needs.setup.outputs.GNOSISVPN_PACKAGE_VERSION }}.pkg
      - name: Upload Signature
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: GnosisVPN-Installer.pkg.sha256
          path: ./build/packages/GnosisVPN-Installer-v${{ needs.setup.outputs.GNOSISVPN_PACKAGE_VERSION }}.pkg.sha256
      - name: Prepare files for upload
        id: prepare_files
        run: |
          if [[ "${{ inputs.version_type }}" == "release" ]]; then
            channel="stable"
          else
            channel="latest"
          fi
          echo "channel=${channel}" | tee -a "$GITHUB_OUTPUT"
          version="${{ needs.setup.outputs.GNOSISVPN_PACKAGE_VERSION }}"
          # AR rejects '+' in filenames; we substitute '-' for the slug and
          # reuse it for GCS so both targets share one staging dir. The
          # canonical version (with '+') is preserved in env vars and manifests.
          fs_version="${version//+/-}"
          src_pkg="./build/packages/GnosisVPN-Installer-v${version}.pkg"
          # The upstream .sha256 hard-codes GnosisVPN-Installer-v<version>.pkg
          # as its filename, so we rewrite it to match the renamed .pkg —
          # otherwise `shasum -c` fails with "no such file".
          src_sha=$(cut -d' ' -f1 "${src_pkg}.sha256")
          mkdir -p ./build/macos/${channel}
          cp "${src_pkg}" "./build/macos/${channel}/gnosisvpn_${fs_version}_arm64.pkg"
          printf '%s  %s\n' "${src_sha}" "gnosisvpn_${fs_version}_arm64.pkg" \
            > "./build/macos/${channel}/gnosisvpn_${fs_version}_arm64.pkg.sha256"
      - name: Publish into Google Artifact registry
        if: inputs.version_type != 'snapshot'
        uses: hoprnet/hopr-workflows/actions/upload-artifact-registry@621619750f6772109d7840a7013135c212925d58 # upload-artifact-registry-v2
        with:
          source: ./build/macos/${{ steps.prepare_files.outputs.channel }}
          package: gnosis_vpn
          version: ${{ needs.setup.outputs.GNOSISVPN_PACKAGE_VERSION }}
      - name: Setup GCP
        uses: hoprnet/hopr-workflows/actions/setup-gcp@621619750f6772109d7840a7013135c212925d58 # setup-gcp-v3
        if: inputs.version_type == 'snapshot' || inputs.version_type == 'release'
        with:
          workload_identity_provider: projects/656686060169/locations/global/workloadIdentityPools/gnosisvpn-gh-pool/providers/github-provider
          service_account: download-gnosisvpn-gh-sa@gnosisvpn-production.iam.gserviceaccount.com
          install_sdk: true
      - name: Check no stable macOS re-release
        # Refuse to overwrite a versioned stable .pkg with different bytes —
        # the immutable cache would split client bytes from .sha256. Retries
        # with matching bytes are idempotent. Mirrors scripts/publish-apt.sh.
        if: inputs.version_type == 'release'
        run: |
          version="${{ needs.setup.outputs.GNOSISVPN_PACKAGE_VERSION }}"
          dest="gs://download.gnosisvpn.io/macos/stable/gnosisvpn_${version}_arm64.pkg"
          local_pkg="./build/macos/stable/gnosisvpn_${version}_arm64.pkg"
          if gsutil -q stat "$dest" 2>/dev/null; then
            tmp=$(mktemp)
            gsutil -q cp "$dest" "$tmp"
            if ! cmp -s "$tmp" "$local_pkg"; then
              echo "ERROR: ${dest} already exists with different content." >&2
              echo "Re-releasing the same version is not supported — bump package.json or delete the old .pkg manually." >&2
              rm -f "$tmp"
              exit 1
            fi
            rm -f "$tmp"
            echo "Stable .pkg already in bucket with matching bytes; upload will be idempotent."
          fi
      - name: Publish into bucket
        # Cache headers are set at upload time (gsutil -h) rather than via a
        # post-upload `setmeta` wildcard to only touch the newly uploaded objects.
        if: inputs.version_type == 'snapshot' || inputs.version_type == 'release'
        run: |
          gsutil -m -h "Cache-Control:public, max-age=31536000, immutable" \
            cp -r "./build/macos/${{ steps.prepare_files.outputs.channel }}/." \
            "gs://download.gnosisvpn.io/macos/${{ steps.prepare_files.outputs.channel }}/"
  ## TODO Publish into IPFS as well
  publish_apt:
    name: Publish APT
    needs:
      - setup
      - linux
    if: |
      needs.setup.outputs.SKIP_BUILDING != 'true' &&
      inputs.version_type == 'snapshot'
    uses: ./.github/workflows/publish-apt.yaml
    with:
      channel: snapshot
      package_version: ${{ needs.setup.outputs.GNOSISVPN_PACKAGE_VERSION }}
    secrets: inherit
