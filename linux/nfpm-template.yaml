---
name: gnosisvpn
arch: "${NFPM_ARCHITECTURE}"
platform: linux
version: "${GNOSISVPN_PACKAGE_VERSION}"
# None, because 'semver' strips zeros (2026.05.27 -> 2026.5.27)
version_schema: none
section: net
priority: optional
maintainer: Hoprnet <tech@hoprnet.org>
description: |
  Decentralized, trustless, uncensorable VPN for the web3 age.
  Fully anonymous browsing over a decentralized mixnet.
license: GNU General Public License v3.0
homepage: https://vpn.gnosis.eth.limo/
rpm:
  signature:
    key_file: ${GNOSISVPN_GPG_PRIVATE_KEY_PATH}
overrides:
  deb:
    depends:
      - libc6
      - systemd
      - iptables
      - logrotate
      - wireguard
      - ca-certificates
      - libwebkit2gtk-4.1-0
      # Ubuntu 24.04+ renamed libgtk-3-0 to libgtk-3-0t64 (64-bit time_t
      # transition); keep the old name as a fallback for pre-noble systems.
      - libgtk-3-0t64 | libgtk-3-0
      - libayatana-appindicator3-1
      - libglib2.0-bin
  rpm:
    depends:
      - systemd
      - iptables
      - logrotate
      - wireguard
      - ca-certificates
      - webkit2gtk4.1
      - gtk3
      - libayatana-appindicator-gtk3
      - glib2
  archlinux:
    depends:
      - webkit2gtk-4.1
      - gtk3
      - libayatana-appindicator
      - glib2
contents:
  # Binaries
  - src: ./build/download/gnosis_vpn-root
    dst: /usr/bin/gnosis_vpn-root
    file_info:
      mode: 0750
      owner: root
      group: root
  - src: ./build/download/gnosis_vpn-worker
    dst: /usr/bin/gnosis_vpn-worker
    file_info:
      mode: 0750
  - src: ./build/download/gnosis_vpn-ctl
    dst: /usr/bin/gnosis_vpn-ctl
    file_info:
      mode: 0755
  - src: ./build/gnosis_vpn-app
    dst: /usr/bin/gnosis_vpn-app
    file_info:
      mode: 0755
  # Resource files
  - src: ./build/resources/version.txt
    dst: /etc/gnosisvpn/version.txt
    file_info:
      mode: 0644
      owner: root
      group: root
  # Dearmored signing public key, used by postinstall.sh to register the APT
  # source so `apt-get update` sees future versions after a manual `dpkg -i`.
  - src: ./build/resources/gnosisvpn-archive-keyring.gpg
    dst: /usr/share/gnosisvpn/gnosisvpn-archive-keyring.gpg
    file_info:
      mode: 0644
      owner: root
      group: root
  - src: ./linux/resources/gnosisvpn.env
    dst: /etc/gnosisvpn/gnosisvpn.env
    type: config
    file_info:
      mode: 0644
  - src: ./linux/resources/config-jura.toml
    dst: /etc/gnosisvpn/config-jura.toml
    type: config
    file_info:
      mode: 0644
  - src: ./linux/resources/config-rotsee.toml
    dst: /etc/gnosisvpn/config-rotsee.toml
    type: config
    file_info:
      mode: 0644
  - src: ./linux/resources/logrotate.conf
    dst: /etc/logrotate.d/gnosisvpn
    type: config
    file_info:
      mode: 0644
      owner: root
      group: root
  - src: ./linux/resources/gnosisvpn.service
    dst: /usr/lib/systemd/system/gnosisvpn.service
  - src: ./linux/resources/copyright
    dst: /usr/share/doc/gnosisvpn/copyright
  - src: ./linux/resources/gnosisvpn.metainfo.xml
    dst: /usr/share/metainfo/com.gnosisvpn.gnosisvpnclient.metainfo.xml
    file_info:
      mode: 0644
      owner: root
      group: root
  - src: ./build/changelog/changelog.gz
    dst: /usr/share/doc/gnosisvpn/changelog.gz
    file_info:
      mode: 0644
      owner: root
      group: root
  - src: ./linux/resources/lintian-overrides
    dst: /usr/share/lintian/overrides/gnosisvpn
    file_info:
      mode: 0644
      owner: root
      group: root
  # AppArmor local drop-in: grants the wg-quick profile (Ubuntu 26.04+) read
  # access to our managed WireGuard config. Plain content (no type: config) so
  # it is removed cleanly on uninstall; postinstall/postuninstall reparse the
  # wg-quick profile to pick up / drop this local include.
  - src: ./linux/resources/apparmor-local-wg-quick
    dst: /etc/apparmor.d/local/wg-quick
    file_info:
      mode: 0644
      owner: root
      group: root
  # Shell completions
  - src: ./build/completions/gnosis_vpn-ctl.bash
    dst: /usr/share/bash-completion/completions/gnosis_vpn-ctl
    file_info:
      mode: 0644
  - src: ./build/completions/gnosis_vpn-ctl.fish
    dst: /usr/share/fish/vendor_completions.d/gnosis_vpn-ctl.fish
    file_info:
      mode: 0644
  - src: ./build/completions/_gnosis_vpn-ctl
    dst: /usr/share/zsh/vendor-completions/_gnosis_vpn-ctl
    file_info:
      mode: 0644
  # Manual pages
  - src: ./build/man/man1/gnosis_vpn-root.1.gz
    dst: /usr/share/man/man1/gnosis_vpn-root.1.gz
    file_info:
      mode: 0644
      owner: root
      group: root
  - src: ./build/man/man1/gnosis_vpn-worker.1.gz
    dst: /usr/share/man/man1/gnosis_vpn-worker.1.gz
    file_info:
      mode: 0644
      owner: root
      group: root
  - src: ./build/man/man1/gnosis_vpn-ctl.1.gz
    dst: /usr/share/man/man1/gnosis_vpn-ctl.1.gz
    file_info:
      mode: 0644
      owner: root
      group: root
  - src: ./build/man/man1/gnosis_vpn-app.1.gz
    dst: /usr/share/man/man1/gnosis_vpn-app.1.gz
    file_info:
      mode: 0644
      owner: root
      group: root
__GNOSIS_VPN_APP_CONTENTS__
scripts:
  preinstall: ./linux/scripts/preinstall.sh
  postinstall: ./linux/scripts/postinstall.sh
  preremove: ./linux/scripts/preuninstall.sh
  postremove: ./linux/scripts/postuninstall.sh
